name: rebuild

on:
  repository_dispatch:
    types: [rebuild]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    concurrency:
      group: rebuild
      cancel-in-progress: true
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.FONTIST_CI_PAT_TOKEN }}

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install fonttools

      - name: Checkout formulas
        uses: actions/checkout@v4
        with:
          repository: fontist/formulas
          ref: v5
          path: formulas

      - name: Configure git
        env:
          CI_TOKEN: ${{ secrets.FONTIST_CI_PAT_TOKEN }}
        run: |
          git remote set-url origin "https://x-access-token:${CI_TOKEN}@github.com/fontist/fontist-archive.git"
          git config user.name "Fontist Bot"
          git config user.email "bot@fontist.org"

      - name: Build + commit in batches
        run: |
          BATCH=50
          ROUND=1
          while true; do
            echo "=== Round $ROUND ==="
            ruby bin/build --formula-dir formulas/Formulas --limit $BATCH --verbose || true

            git add -A
            if ! git diff --cached --quiet; then
              git pull --rebase --autostash || true
              git commit -m "Batch $ROUND"
              git push
              echo "Pushed batch $ROUND"
            else
              echo "No changes — all done"
              break
            fi

            ROUND=$((ROUND + 1))
            if [ $ROUND -gt 200 ]; then
              echo "Safety limit reached"
              break
            fi
          done

          echo "Coverage: $(find coverage -name '*.json' | wc -l)"
          echo "Woff: $(find fonts -name '*.woff' | wc -l)"

      - name: Trigger website rebuild
        if: success()
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.FONTIST_CI_PAT_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/fontist/fontist.github.io/dispatches \
            -d '{"event_type":"rebuild"}'
